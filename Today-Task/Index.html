<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus on today</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1><span>Today</span> Task</h1>
        </div>
        <div class="box">

            <div class="Today">
                <h2>Today <i class="fa-solid fa-sun"> </i></h2>
            </div>

            <div class="progressbar ">
                <p class="label">Raise the bar by completing your goals!</p>
                <div class="barbg">
                    <div class="proges">
                        <span>2/3 compeleted</span>
                    </div>
                </div>
                <p class="error">Please set all the 3 goals</p>
            </div>
    
            <div class="options">
                
                        <div class="opt1">
                            <div class="input_area ">
                                <div class="gol"></div>
                                <input type="text" class="txt" placeholder="Add  new goal.." name="task" id="goal_one">
                            </div>
                        </div>
                        <div class="opt1">
                            <div class="input_area ">
                                <div class="gol"></div>
                                <input type="text" class="txt" placeholder="Add  new goal.." name="task" id="goal_two">
                            </div>
                        </div>
                        <div class="opt1">
                            <div class="input_area ">
                                <div class="gol"></div>
                                <input type="text" class="txt" placeholder="Add  new goal.." name="task" id="goal_three">
                            </div>
                        </div>
                
            </div>
    

            <div class="foot">
                <h5>"Move one step ahead, today!"</h5>
                <p>Made with ❤️ of Aniket</p>
            </div>

        </div>
    </div>
</body>
</html>
